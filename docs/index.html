<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paletas de colores RANDOM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="contenedor-header">
        <h1 class="titulo-principal">Colorfly Studio 🎨</h1>
        <p class="descripcion">✨ Diseña paletas modernas de forma instantánea</p>
    </header>

    <main class="contenedor-main">

        <div class="contenedor-botones">

<!--                     <h2 class="titulo-seleccion">Seleccione cantidad.  </h2> -->
                    <select class="seleccion-cantidad">
                        <option value="texto">Tamaño de paleta</option>
                        <option value= 6 >6 Colores</option>
                        <option value= 8 >8 Colores</option>
                        <option value= 9 >9 Colores</option>
                    </select>   

                <button class="boton-generar">Generar</button>

                <div class="contenedor-formato">  
                    <p>Formato : </p>

                    <label class="check-hsl">
                        <input type="radio" name="formato" value="HSL" >  HSL
                    </label>
                    
                    <label class="check-hexa">
                        <input type="radio" name="formato"  value="HEXA" checked > HEXA
                    </label>

                </div> 
                <p class="consejo">💡 Consejo: Haz clic en el candado para mantener un color al regenerar la paleta</p>

        
        </div>

        <div class="contenedor-colores">
        </div>    
    </main>
    <script src="index.js"></script>
</body>
</html>
