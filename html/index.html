<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paletas de colores RANDOM</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header class="contenedor-header">
        <h1 class="titulo-principal">Generador de Paletas de Colores</h1>
        <p class="descripcion">Genera paletas automaticas con diferentes colores</p>
    </header>

    <main class="contenedor-main">

        <div class="contenedor-botones">
                <div class="contenedor-seleccion">
                    <h2 class="titulo-seleccion">Seleccione cantidad</h2>
                    <select id="cantidad-colores">
                        <option value="6">6 Colores</option>
                        <option value="8">8 Colores</option>
                        <option value="9">9 Colores</option>
                    </select>   
                </div>

                <button id="boton-generar">Generar</button>

                <button id="boton-exportar">Exportar</button>
        
        </div>

        <div id="contenedor-colores">
        </div>    
    </main>
    <script src="../js/index.js"></script>
</body>
</html>
